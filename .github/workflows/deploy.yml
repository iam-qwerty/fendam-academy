name: Deploy NestJS API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies & Build
        run: |
          cd backend
          bun install
          bun run build

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          # Point to the backend subfolder for the source
          source: "backend/dist,backend/package.json,backend/prisma,backend/bun.lockb"
          target: "~/fendam-academy"
          strip_components: 1 # Crucial! Removes the "backend/" prefix so files land in the right spot
          overwrite: true

      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/fendam-academy
            bun install --production --ignore-scripts
            # Generate Prisma client in case schema changed
            bunx prisma generate
            sudo systemctl restart fendam
